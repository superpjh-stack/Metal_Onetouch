# ====================================================================
# Onetouch AI+MES - Mosquitto MQTT Broker Configuration (Development)
# ====================================================================

# --- Default MQTT listener (TCP) ------------------------------------
listener 1883
protocol mqtt

# --- WebSocket listener (for browser clients) -----------------------
listener 9001
protocol websockets

# --- Authentication (development only) ------------------------------
# In production: configure password_file + ACL.
allow_anonymous true

# --- Persistence ----------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# --- Logging --------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# --- Connection limits ----------------------------------------------
max_connections -1
max_keepalive 65535
max_packet_size 268435456
