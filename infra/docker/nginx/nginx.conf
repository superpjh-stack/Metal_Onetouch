# ====================================================================
# Onetouch AI+MES - Nginx Reverse Proxy (Development)
# Routes:
#   /        -> frontend  (Next.js, port 3000)
#   /api/    -> backend   (FastAPI, port 8000)
#   /ws/     -> backend   (WebSocket upgrade)
# ====================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ----------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # --- Performance ------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_max_body_size 200M;   # Allow CAD file uploads
    client_body_buffer_size 128k;

    # --- Gzip -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # --- Upstreams --------------------------------------------------
    upstream onetouch_frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream onetouch_backend {
        server backend:8000;
        keepalive 32;
    }

    # --- WebSocket connection upgrade map ---------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ================================================================
    # HTTP server (development)
    # ================================================================
    server {
        listen       80 default_server;
        listen  [::]:80 default_server;
        server_name  _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # /api/ -> FastAPI backend
        location /api/ {
            proxy_pass         http://onetouch_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /ws/ -> WebSocket upgrade
        location /ws/ {
            proxy_pass         http://onetouch_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;   # 24h for long-lived sockets
            proxy_send_timeout 86400s;
        }

        # / -> Next.js frontend (must be last)
        location / {
            proxy_pass         http://onetouch_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ================================================================
    # HTTPS server (TLS termination — uncomment in production)
    # ================================================================
    # server {
    #     listen       443 ssl http2;
    #     listen  [::]:443 ssl http2;
    #     server_name  onetouch.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... same location blocks as HTTP server above ...
    # }
    #
    # # HTTP -> HTTPS redirect
    # server {
    #     listen 80;
    #     server_name onetouch.example.com;
    #     return 301 https://$host$request_uri;
    # }
}
