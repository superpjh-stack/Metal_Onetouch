[alembic]
# Alembic 마이그레이션 스크립트 위치
script_location = alembic

# 마이그레이션 파일 이름 형식
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 타임존 설정
timezone = UTC

# truncate_slug_length: 마이그레이션 파일명 슬러그 최대 길이
truncate_slug_length = 40

# 소스 인코딩
source_encoding = utf-8

# 출력 인코딩
output_encoding = utf-8

# 데이터베이스 URL — env.py에서 오버라이드됨
# sqlalchemy.url = postgresql+asyncpg://user:pass@host/db

[post_write_hooks]
# 생성된 마이그레이션 파일에 자동 포매팅 적용 (선택)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
